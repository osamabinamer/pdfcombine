<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>PDF Tools: Merge & Split</title>
    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Google Fonts (Inter for modern look) -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <!-- SortableJS -->
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
    <!-- PDF.js for PDF thumbnails -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/4.2.67/pdf.min.js"></script>
    <!-- Toastify for notifications -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/toastify-js/src/toastify.min.css">
    <script src="https://cdn.jsdelivr.net/npm/toastify-js"></script>
    <style>
        :root {
            --bg-primary: #ffffff;
            --bg-secondary: #f8f9fa;
            --bg-tertiary: #f0f8ff;
            --text-primary: #444444;
            --text-secondary: #6c757d;
            --border-color: #007bff;
            --card-shadow: rgba(60,60,120,0.18);
            --body-bg: linear-gradient(120deg, #f5f7fa 0%, #e9eff7 100%);
        }

        html.dark-mode {
            --bg-primary: #1a1a1a;
            --bg-secondary: #2a2a2a;
            --bg-tertiary: #1e3a5f;
            --text-primary: #e0e0e0;
            --text-secondary: #a0a0a0;
            --border-color: #4a9eff;
            --card-shadow: rgba(0,0,0,0.4);
            --body-bg: linear-gradient(120deg, #0d0d0d 0%, #1a1a2e 100%);
        }

        body {
            background: var(--body-bg);
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            color: var(--text-primary);
            transition: background 0.3s ease;
        }
        .main-card {
            max-width: 540px;
            margin: 7vh auto 0 auto;
            background: var(--bg-primary);
            border-radius: 2.1rem;
            box-shadow: 0 8px 32px var(--card-shadow);
            padding: 2.7rem 2rem 2.2rem 2rem;
            animation: fadeIn 1.1s cubic-bezier(0.4,0,0.2,1);
            transition: background 0.3s ease, box-shadow 0.3s ease;
        }
        .main-card img.logo {
            width: 56px;
            margin-bottom: 0.5rem;
        }
        .main-card h2 {
            font-weight: 700;
            font-size: 1.7rem;
            color: var(--text-primary);
        }
        .instructions {
            font-size: 1.04rem;
            color: var(--text-secondary);
            margin-bottom: 1.1rem;
        }
        .nav-tabs {
            border: none;
            margin-bottom: 1.2rem;
        }
        .nav-tabs .nav-link {
            border: none;
            color: var(--border-color);
            font-weight: 600;
            background: none;
            border-radius: 0.8rem 0.8rem 0 0;
            transition: background 0.2s, color 0.2s;
        }
        .nav-tabs .nav-link.active {
            background: var(--bg-tertiary);
            color: #0056b3;
            border-bottom: 2px solid var(--border-color);
        }
        .custom-file-label {
            border: 2px dashed var(--border-color);
            border-radius: 1.1rem;
            padding: 1.2rem;
            text-align: center;
            color: var(--border-color);
            font-weight: 500;
            background: var(--bg-tertiary);
            transition: background 0.3s, border-color 0.3s, box-shadow 0.3s, transform 0.2s;
            cursor: pointer;
            box-shadow: 0 2px 8px rgba(60,60,120,0.06);
            margin-bottom: 0.4rem;
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        html.dark-mode .custom-file-label {
            box-shadow: 0 2px 8px rgba(0,0,0,0.3);
        }
        .custom-file-label.dragover {
            background: #e3f2fd;
            border-color: #0056b3;
            box-shadow: 0 4px 16px rgba(0,123,255,0.13);
            transform: scale(1.02);
        }
        html.dark-mode .custom-file-label.dragover {
            background: rgba(74,158,255,0.15);
            box-shadow: 0 4px 16px rgba(74,158,255,0.2);
        }
        .custom-file-input {
            opacity: 0;
            position: absolute;
            left: 0; top: 0; width: 100%; height: 100%;
            cursor: pointer;
            z-index: 2;
        }
        .file-list {
            margin-top: 0.7rem;
            margin-bottom: 0.7rem;
        }
        .file-list li {
            font-size: 0.97rem;
            color: var(--text-primary);
            background: var(--bg-secondary);
            border-radius: 0.6rem;
            padding: 0.38rem 0.7rem;
            margin-bottom: 0.35rem;
            animation: fadeIn 0.5s;
            cursor: grab;
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-shadow: 0 1px 4px rgba(0,123,255,0.1);
            transition: box-shadow 0.18s, transform 0.18s;
        }
        html.dark-mode .file-list li {
            box-shadow: 0 1px 4px rgba(0,0,0,0.2);
        }
        .file-list li:hover {
            box-shadow: 0 2px 8px rgba(0,123,255,0.22);
            transform: translateY(-1px) scale(1.01);
        }
        .drag-handle {
            cursor: grab;
            margin-right: 0.7em;
            color: var(--border-color);
            font-size: 1.2em;
            user-select: none;
        }
        .file-preview-img {
            height: 38px;
            width: auto;
            margin-right: 10px;
            border-radius: 4px;
            object-fit: cover;
        }
        .file-preview-icon {
            height: 32px;
            width: 32px;
            margin-right: 10px;
        }
        .file-info {
            font-size: 0.75rem;
            color: var(--text-secondary);
            display: block;
            margin-top: 2px;
        }
        .btn-remove {
            margin-left: auto;
            display: flex;
            align-items: center;
            padding: 0.2rem 0.7rem;
            font-size: 0.98em;
        }
        .btn-primary {
            width: 100%;
            background: linear-gradient(90deg, #007bff 0%, #0056b3 100%);
            border: none;
            color: #fff;
            font-weight: 700;
            letter-spacing: 0.5px;
            font-size: 1.18rem;
            padding: 0.95rem 0;
            border-radius: 1.2rem;
            box-shadow: 0 6px 24px rgba(0,123,255,0.13);
            transition: background 0.3s, box-shadow 0.3s, transform 0.15s;
        }
        .btn-primary:hover, .btn-primary:focus {
            background: linear-gradient(90deg, #0056b3 0%, #007bff 100%);
            box-shadow: 0 8px 32px rgba(0,123,255,0.19);
            transform: translateY(-1px) scale(1.03);
        }
        .btn-primary:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }
        .btn-sm.btn-outline-danger {
            color: #dc3545;
            border-color: #dc3545;
        }
        html.dark-mode .btn-sm.btn-outline-danger {
            color: #ff6b6b;
            border-color: #ff6b6b;
        }
        .theme-toggle {
            position: fixed;
            top: 1.5rem;
            right: 1.5rem;
            background: var(--bg-primary);
            border: 2px solid var(--border-color);
            border-radius: 50%;
            width: 50px;
            height: 50px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.3rem;
            box-shadow: 0 4px 12px var(--card-shadow);
            transition: all 0.3s ease;
            z-index: 1000;
        }
        .theme-toggle:hover {
            transform: scale(1.1);
            box-shadow: 0 6px 16px var(--card-shadow);
        }
        .alert-notification {
            position: fixed;
            top: 20px;
            right: 20px;
            max-width: 400px;
            z-index: 1001;
        }
        .form-control, .form-control-sm {
            background: var(--bg-secondary);
            border-color: var(--border-color);
            color: var(--text-primary);
            transition: background 0.3s ease, border-color 0.3s ease;
        }
        .form-control:focus, .form-control-sm:focus {
            background: var(--bg-secondary);
            border-color: #0056b3;
            color: var(--text-primary);
            box-shadow: 0 0 0 0.2rem rgba(0, 123, 255, 0.25);
        }
        .form-label {
            color: var(--text-primary);
        }
        .tab-content {
            margin-top: 1.3rem;
        }
        .split-option-row {
            margin-bottom: 0.5rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        .split-option-row label {
            font-weight: 500;
            margin-bottom: 0;
        }
        .split-option-row input[type="text"], .split-option-row input[type="number"] {
            width: 90px;
            margin-left: 0.5rem;
            margin-bottom: 0;
            display: inline-block;
            vertical-align: middle;
        }
        .main-card small {
            font-size: 0.98em;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(40px);}
            to { opacity: 1; transform: translateY(0);}
        }
        @media (max-width: 700px) {
            .main-card {
                max-width: 99vw;
                padding: 1.2rem 0.2rem 1.2rem 0.2rem;
                border-radius: 1.1rem;
            }
        }
    </style>
</head>
<body>
    <!-- Theme Toggle Button -->
    <button class="theme-toggle" id="themeToggle" title="Toggle dark mode" aria-label="Toggle dark mode">🌙</button>

    <div class="main-card shadow-lg">
        <div class="text-center mb-3">
            <img src="https://img.icons8.com/ios-filled/100/007bff/pdf.png" alt="PDF Merger" class="logo">
            <h2>PDF Tools: Merge &amp; Split</h2>
            <p class="instructions">
                Merge PDFs/images, or split a PDF into multiple files.<br>
                <span style="color:#007bff;">Preview, remove, and reorder files before merging.</span>
            </p>
        </div>
        <ul class="nav nav-tabs justify-content-center" id="pdfTab" role="tablist">
            <li class="nav-item" role="presentation">
                <button class="nav-link active" id="merge-tab" data-bs-toggle="tab" data-bs-target="#merge" type="button" role="tab" aria-controls="merge" aria-selected="true">Merge PDF &amp; Images</button>
            </li>
            <li class="nav-item" role="presentation">
                <button class="nav-link" id="split-tab" data-bs-toggle="tab" data-bs-target="#split" type="button" role="tab" aria-controls="split" aria-selected="false">Split PDF</button>
            </li>
        </ul>
        <div class="tab-content">
            <!-- Merge Tab -->
            <div class="tab-pane fade show active" id="merge" role="tabpanel" aria-labelledby="merge-tab">
                <form method="POST" enctype="multipart/form-data" id="pdfForm" autocomplete="off">
                    <label class="form-label mt-2 mb-1">Select PDF and image files to merge</label>
                    <div class="mb-2 position-relative">
                        <label class="custom-file-label" id="dropLabel">
                            <span id="labelText" style="margin-bottom:6px;">Click or drag &amp; drop your PDFs and images here</span>
                            <input type="file" name="files" multiple accept=".pdf,.jpg,.jpeg,.png" class="custom-file-input" id="pdfInput" required tabindex="0">
                            <span id="fileCount" style="color:#007bff; font-size:0.96em; margin-top:4px;"></span>
                        </label>
                    </div>
                    <ul class="file-list list-unstyled" id="fileList"></ul>
                    
                    <label class="form-label mt-3 mb-2">Output file name (optional)</label>
                    <div class="input-group mb-3">
                        <input type="text" class="form-control" id="outputFilename" placeholder="merged.pdf" aria-label="Output filename">
                        <span class="input-group-text">.pdf</span>
                    </div>

                    <input type="hidden" name="order" id="fileOrder">
                    <button type="submit" class="btn btn-primary mt-2" id="mergeBtn">Merge Files</button>
                </form>
            </div>
            <!-- Split Tab -->
            <div class="tab-pane fade" id="split" role="tabpanel" aria-labelledby="split-tab">
                <form method="POST" enctype="multipart/form-data" id="splitForm" action="/split" autocomplete="off">
                    <label class="form-label mt-2 mb-1">Select a PDF to split</label>
                    <div class="mb-3">
                        <input type="file" name="pdf" accept=".pdf" class="form-control" id="splitPdfInput" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label mb-2">Split Options</label>
                        <div class="split-option-row">
                            <input type="radio" name="split_type" value="all_pages" id="split_all" checked>
                            <label for="split_all" class="mb-0">Split every page (each page as a separate PDF)</label>
                        </div>
                        <div class="split-option-row">
                            <input type="radio" name="split_type" value="range" id="split_range">
                            <label for="split_range" class="mb-0">Extract page range:</label>
                            <input type="text" name="page_range" id="pageRangeInput" placeholder="e.g. 3-7" class="form-control form-control-sm" disabled>
                        </div>
                        <div class="split-option-row">
                            <input type="radio" name="split_type" value="every_n" id="split_n">
                            <label for="split_n" class="mb-0">Split every</label>
                            <input type="number" name="every_n" id="everyNInput" min="1" placeholder="N" class="form-control form-control-sm" disabled>
                            <span>pages</span>
                        </div>
                    </div>
                    <button type="submit" class="btn btn-primary mt-2" id="splitBtn">Split PDF</button>
                </form>
            </div>
        </div>
        <div class="text-center mt-4">
            <small class="text-muted">Made with <span style="color:#e25555;">&#10084;</span> using FastAPI, pypdf &amp; Pillow</small>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // ========== THEME TOGGLE ==========
        const themeToggle = document.getElementById('themeToggle');
        const htmlElement = document.documentElement;

        // Load theme preference from localStorage
        function loadTheme() {
            const savedTheme = localStorage.getItem('theme') || 'light';
            if (savedTheme === 'dark') {
                htmlElement.classList.add('dark-mode');
                if (themeToggle) themeToggle.textContent = '☀️';
            } else {
                htmlElement.classList.remove('dark-mode');
                if (themeToggle) themeToggle.textContent = '🌙';
            }
        }

        // Add click handler to theme toggle
        if (themeToggle) {
            themeToggle.addEventListener('click', function(e) {
                e.preventDefault();
                e.stopPropagation();
                htmlElement.classList.toggle('dark-mode');
                const isDark = htmlElement.classList.contains('dark-mode');
                localStorage.setItem('theme', isDark ? 'dark' : 'light');
                themeToggle.textContent = isDark ? '☀️' : '🌙';
                console.log('Dark mode toggled:', isDark);
            });
        }

        // Apply theme on page load
        loadTheme();

        // ========== NOTIFICATIONS ==========
        function showNotification(message, type = 'info') {
            Toastify({
                text: message,
                duration: 4000,
                gravity: "top",
                position: "right",
                backgroundColor: type === 'error' ? '#dc3545' : type === 'success' ? '#28a745' : '#007bff',
                stopOnFocus: true
            }).showToast();
        }

        function showError(message) {
            showNotification(message, 'error');
        }

        function showSuccess(message) {
            showNotification(message, 'success');
        }

        // ========== FILE SIZE FORMATTING ==========
        function formatFileSize(bytes) {
            if (bytes === 0) return '0 Bytes';
            const k = 1024;
            const sizes = ['Bytes', 'KB', 'MB', 'GB'];
            const i = Math.floor(Math.log(bytes) / Math.log(k));
            return Math.round(bytes / Math.pow(k, i) * 100) / 100 + ' ' + sizes[i];
        }

        // ========== MERGE TAB JS ==========
        const pdfInput = document.getElementById('pdfInput');
        const fileList = document.getElementById('fileList');
        const fileOrder = document.getElementById('fileOrder');
        const dropLabel = document.getElementById('dropLabel');
        const labelText = document.getElementById('labelText');
        const fileCount = document.getElementById('fileCount');
        const pdfForm = document.getElementById('pdfForm');
        const outputFilename = document.getElementById('outputFilename');
        let filesArray = [];

        pdfInput.addEventListener('change', () => {
            filesArray = Array.from(pdfInput.files);
            renderFileList();
        });

        // Drag & drop events for styling
        dropLabel.addEventListener('dragover', (e) => {
            e.preventDefault();
            dropLabel.classList.add('dragover');
        });
        dropLabel.addEventListener('dragleave', (e) => {
            e.preventDefault();
            dropLabel.classList.remove('dragover');
        });
        dropLabel.addEventListener('drop', (e) => {
            e.preventDefault();
            dropLabel.classList.remove('dragover');
            pdfInput.files = e.dataTransfer.files;
            filesArray = Array.from(pdfInput.files);
            renderFileList();
        });

        function renderFileList() {
            fileList.innerHTML = '';
            let totalSize = 0;
            
            if (filesArray.length > 0) {
                fileCount.textContent = filesArray.length === 1 ? "1 file selected" : `${filesArray.length} files selected`;
                filesArray.forEach((file, idx) => {
                    totalSize += file.size;
                    const li = document.createElement('li');
                    li.className = 'item d-flex align-items-center flex-wrap';
                    li.setAttribute('data-index', idx);

                    // Drag handle
                    const dragHandle = document.createElement('span');
                    dragHandle.className = 'drag-handle';
                    dragHandle.innerHTML = '&#9776;';
                    dragHandle.style.marginRight = '8px';

                    // Preview container
                    const previewContainer = document.createElement('div');
                    previewContainer.style.display = 'flex';
                    previewContainer.style.alignItems = 'center';
                    previewContainer.style.flex = '1';
                    previewContainer.style.minWidth = '0';

                    // Preview
                    let preview;
                    if (file.type.startsWith('image/')) {
                        preview = document.createElement('img');
                        preview.className = 'file-preview-img';
                        preview.src = URL.createObjectURL(file);
                        preview.alt = 'Image preview';
                    } else if (file.name.toLowerCase().endsWith('.pdf')) {
                        preview = document.createElement('canvas');
                        preview.className = 'file-preview-img';
                        preview.style.height = '38px';
                        preview.style.width = 'auto';
                        preview.style.marginRight = '10px';
                        // Render PDF first page as thumbnail
                        const fileReader = new FileReader();
                        fileReader.onload = function() {
                            const typedarray = new Uint8Array(this.result);
                            pdfjsLib.getDocument({data: typedarray}).promise.then(pdf => {
                                pdf.getPage(1).then(page => {
                                    const scale = 0.25;
                                    const viewport = page.getViewport({scale: scale});
                                    preview.width = viewport.width;
                                    preview.height = viewport.height;
                                    const context = preview.getContext('2d');
                                    page.render({canvasContext: context, viewport: viewport});
                                });
                            });
                        };
                        fileReader.readAsArrayBuffer(file);
                    }

                    // File name and info wrapper
                    const infoWrapper = document.createElement('div');
                    infoWrapper.style.flex = '1';
                    infoWrapper.style.minWidth = '0';

                    const fileName = document.createElement('span');
                    fileName.textContent = file.name;
                    fileName.style.display = 'block';
                    fileName.style.overflow = 'hidden';
                    fileName.style.textOverflow = 'ellipsis';
                    fileName.style.whiteSpace = 'nowrap';

                    const fileInfo = document.createElement('span');
                    fileInfo.className = 'file-info';
                    fileInfo.textContent = formatFileSize(file.size);

                    infoWrapper.appendChild(fileName);
                    infoWrapper.appendChild(fileInfo);

                    previewContainer.appendChild(dragHandle);
                    if (preview) previewContainer.appendChild(preview);
                    previewContainer.appendChild(infoWrapper);

                    // Remove button
                    const removeBtn = document.createElement('button');
                    removeBtn.type = 'button';
                    removeBtn.className = 'btn btn-sm btn-outline-danger btn-remove';
                    removeBtn.title = 'Remove this file';
                    removeBtn.innerHTML = '✕ Remove';
                    removeBtn.onclick = (e) => {
                        e.preventDefault();
                        filesArray.splice(idx, 1);
                        renderFileList();
                    };

                    li.appendChild(previewContainer);
                    li.appendChild(removeBtn);
                    fileList.appendChild(li);
                });
                
                // Show total size
                const sizeInfo = document.createElement('div');
                sizeInfo.style.fontSize = '0.85rem';
                sizeInfo.style.color = 'var(--text-secondary)';
                sizeInfo.style.marginTop = '0.5rem';
                sizeInfo.style.textAlign = 'right';
                sizeInfo.textContent = `Total: ${formatFileSize(totalSize)}`;
                fileList.appendChild(sizeInfo);
            } else {
                fileCount.textContent = "";
                labelText.textContent = 'Click or drag & drop your PDFs and images here';
            }
            updateOrderInput();
        }

        // Initialize SortableJS for file reordering
        new Sortable(fileList, {
            animation: 150,
            handle: '.drag-handle',
            onEnd: function () {
                // Rearrange filesArray according to new order
                const newOrder = [];
                fileList.querySelectorAll('li[data-index]').forEach(li => {
                    newOrder.push(filesArray[li.getAttribute('data-index')]);
                });
                filesArray = newOrder;
                renderFileList();
            }
        });

        function updateOrderInput() {
            fileOrder.value = filesArray.map(f => f.name).join(',');
        }

        // Form submission with error handling
        pdfForm.addEventListener('submit', async (e) => {
            e.preventDefault();

            if (filesArray.length === 0) {
                showError('Please select at least one file to merge');
                return;
            }

            const formData = new FormData();
            filesArray.forEach(file => {
                formData.append('files', file);
            });
            formData.append('order', fileOrder.value);
            
            const filename = outputFilename.value.trim() || 'merged';
            formData.append('filename', filename);

            const mergeBtn = document.getElementById('mergeBtn');
            mergeBtn.disabled = true;
            mergeBtn.textContent = 'Merging...';

            try {
                const response = await fetch('/api/merge', {
                    method: 'POST',
                    body: formData
                });

                if (!response.ok) {
                    const errorData = await response.json().catch(() => ({message: 'Unknown error'}));
                    throw new Error(errorData.message || `HTTP ${response.status}: ${response.statusText}`);
                }

                const blob = await response.blob();
                const url = window.URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `${filename}.pdf`;
                document.body.appendChild(a);
                a.click();
                window.URL.revokeObjectURL(url);
                document.body.removeChild(a);

                showSuccess('PDF merged successfully!');
                filesArray = [];
                pdfInput.value = '';
                outputFilename.value = '';
                renderFileList();
            } catch (error) {
                showError(`Error: ${error.message}`);
                console.error('Merge error:', error);
            } finally {
                mergeBtn.disabled = false;
                mergeBtn.textContent = 'Merge Files';
            }
        });

        // ========== SPLIT TAB JS ==========
        // Enable/disable inputs based on split type
        const splitAll = document.getElementById('split_all');
        const splitRange = document.getElementById('split_range');
        const splitN = document.getElementById('split_n');
        const pageRangeInput = document.getElementById('pageRangeInput');
        const everyNInput = document.getElementById('everyNInput');
        const splitForm = document.getElementById('splitForm');

        function updateSplitInputs() {
            pageRangeInput.disabled = !splitRange.checked;
            everyNInput.disabled = !splitN.checked;
            if (splitRange.checked) pageRangeInput.focus();
            if (splitN.checked) everyNInput.focus();
        }

        splitAll.addEventListener('change', updateSplitInputs);
        splitRange.addEventListener('change', updateSplitInputs);
        splitN.addEventListener('change', updateSplitInputs);

        // Split form submission with error handling
        splitForm.addEventListener('submit', async (e) => {
            e.preventDefault();

            const splitPdf = document.getElementById('splitPdfInput').files[0];
            if (!splitPdf) {
                showError('Please select a PDF file to split');
                return;
            }

            if (!splitPdf.type === 'application/pdf') {
                showError('Please select a valid PDF file');
                return;
            }

            const splitType = document.querySelector('input[name="split_type"]:checked').value;
            
            // Validate inputs based on split type
            if (splitType === 'range') {
                const pageRange = pageRangeInput.value.trim();
                if (!pageRange) {
                    showError('Please enter a page range (e.g., 3-7)');
                    return;
                }
                if (!/^\d+-\d+$/.test(pageRange)) {
                    showError('Invalid page range format. Use format like "3-7"');
                    return;
                }
            } else if (splitType === 'every_n') {
                const everyN = everyNInput.value.trim();
                if (!everyN || isNaN(everyN) || everyN < 1) {
                    showError('Please enter a valid number of pages');
                    return;
                }
            }

            const formData = new FormData(splitForm);
            const splitBtn = document.getElementById('splitBtn');
            splitBtn.disabled = true;
            splitBtn.textContent = 'Splitting...';

            try {
                const response = await fetch('/api/split', {
                    method: 'POST',
                    body: formData
                });

                if (!response.ok) {
                    const errorData = await response.json().catch(() => ({message: 'Unknown error'}));
                    throw new Error(errorData.message || `HTTP ${response.status}: ${response.statusText}`);
                }

                const blob = await response.blob();
                const url = window.URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = 'split_pdfs.zip';
                document.body.appendChild(a);
                a.click();
                window.URL.revokeObjectURL(url);
                document.body.removeChild(a);

                showSuccess('PDF split successfully! Check your downloads.');
                document.getElementById('splitPdfInput').value = '';
            } catch (error) {
                showError(`Error: ${error.message}`);
                console.error('Split error:', error);
            } finally {
                splitBtn.disabled = false;
                splitBtn.textContent = 'Split PDF';
            }
        });
    </script>
</body>
</html>
